<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="assets/style/style.css" />
    <script
      src="https://kit.fontawesome.com/b8761b87ac.js"
      crossorigin="anonymous"
    ></script>

    <title>Netflix</title>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">
            <img src="assets/imgs/Netflix_Logo_RGB.png" alt="Logo" />
          </a>

          <div
            class="collapse navbar-collapse order-3 order-lg-1"
            id="navbarSupportedContent"
          >
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="#">Tv Shows</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Movies</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Recently Added</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">My List</a>
              </li>
            </ul>
          </div>

          <div
            class="right-navbar ms-auto me-3 d-flex align-items-center order-1 order-lg-2"
          >
            <ul class="d-flex flex-row align-items-center gap-3 mb-0">
              <li>
                <i class="fa-solid fa-magnifying-glass"></i>
              </li>
              <li>KIDS</li>
              <li><i class="fa-solid fa-bell"></i></li>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle"
                  href="#"
                  role="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  <img src="assets/imgs/profile.png" alt="Profile" />
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                  <li><a class="dropdown-item" href="#">Action</a></li>
                  <li><a class="dropdown-item" href="#">Another action</a></li>
                  <li><hr class="dropdown-divider" /></li>
                  <li>
                    <a class="dropdown-item" href="#">Something else here</a>
                  </li>
                </ul>
              </li>
            </ul>
          </div>

          <button
            class="navbar-toggler order-2"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
      </nav>
    </header>

    <main>
      <div class="topTitle">
        <div
          class="container-fluid px-4 d-flex justify-content-between align-items-center"
        >
          <div class="left-container d-flex align-items-center">
            <h2 class="title mb-0">TV Shows</h2>
            <ul class="mb-0">
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle d-flex align-items-center gap-4"
                  href="#"
                  role="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  <p class="mb-0" id="genre">Genres</p>
                </a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="#">Action</a></li>
                  <li>
                    <a class="dropdown-item" href="#">Another action</a>
                  </li>
                  <li><hr class="dropdown-divider" /></li>
                  <li>
                    <a class="dropdown-item" href="#">Something else here</a>
                  </li>
                </ul>
              </li>
            </ul>
          </div>
          <div class="right-container d-flex align-items-center me-3">
            <i class="fa-solid fa-bars"></i>
            <i class="fa-solid fa-border-all"></i>
          </div>
        </div>
      </div>

      <section id="trending">
        <div class="container-fluid ps-4 mt-4">
          <h3 class="title">Trending Now</h3>

          <div class="swiper trending-swiper mt-2">
            <div class="swiper-wrapper">
              <div class="swiper-slide">
                <img
                  src="assets/imgs/movies/1.png"
                  class="img-fluid w-100"
                  alt="Movie"
                />
              </div>
              <div class="swiper-slide">
                <img
                  src="assets/imgs/movies/2.png"
                  class="img-fluid w-100"
                  alt="Movie"
                />
              </div>
              <div class="swiper-slide">
                <img
                  src="assets/imgs/movies/3.png"
                  class="img-fluid w-100"
                  alt="Movie"
                />
              </div>
              <div class="swiper-slide">
                <img
                  src="assets/imgs/movies/4.png"
                  class="img-fluid w-100"
                  alt="Movie"
                />
              </div>
              <div class="swiper-slide">
                <img
                  src="assets/imgs/movies/5.png"
                  class="img-fluid w-100"
                  alt="Movie"
                />
              </div>
              <div class="swiper-slide">
                <img
                  src="assets/imgs/movies/6.png"
                  class="img-fluid w-100"
                  alt="Movie"
                />
              </div>
              <div class="swiper-slide">
                <img
                  src="assets/imgs/movies/7.png"
                  class="img-fluid w-100"
                  alt="Movie"
                />
              </div>
              <div class="swiper-slide">
                <img
                  src="assets/imgs/movies/8.png"
                  class="img-fluid w-100"
                  alt="Movie"
                />
              </div>
              <div class="swiper-slide">
                <img
                  src="assets/imgs/movies/9.png"
                  class="img-fluid w-100"
                  alt="Movie"
                />
              </div>
              <div class="swiper-slide">
                <img
                  src="assets/imgs/movies/10.png"
                  class="img-fluid w-100"
                  alt="Movie"
                />
              </div>
              <div class="swiper-slide">
                <img
                  src="assets/imgs/movies/11.png"
                  class="img-fluid w-100"
                  alt="Movie"
                />
              </div>
              <div class="swiper-slide">
                <img
                  src="assets/imgs/movies/12.png"
                  class="img-fluid w-100"
                  alt="Movie"
                />
              </div>
            </div>

            <div class="swiper-button-prev d-none d-lg-flex"></div>
            <div class="swiper-button-next d-none d-lg-flex"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
